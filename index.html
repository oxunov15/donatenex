<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DonateNex | Futuristic Donation Platform</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Custom Cursor -->
  <div class="cursor"></div>

  <!-- Header -->
  <header>
    <div class="logo">
      <img src="assets/logo.svg" alt="DonateNex">
    </div>
    <nav>
      <div class="language-selector">
        <button id="lang-btn">UZ</button>
        <ul class="lang-dropdown">
          <li><img src="assets/uz.svg" alt="UZ"> UZ</li>
          <li><img src="assets/ru.svg" alt="RU"> RU</li>
          <li><img src="assets/kz.svg" alt="KZ"> KZ</li>
          <li><img src="assets/kg.svg" alt="KG"> KG</li>
          <li><img src="assets/tj.svg" alt="TJ"> TJ</li>
        </ul>
      </div>
      <button class="login-btn">Login</button>
    </nav>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <h1>Empower the Future</h1>
    <p>Donate seamlessly with blockchain-powered transparency.</p>
    <button class="cta-button">Donate Now</button>
  </section>

  <script src="script.js"></script>
</body>
</html>
