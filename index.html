<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DonateNex | Futuristic Donation Platform</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    /* Temporary inline CSS for critical mobile fixes */
    @media (max-width: 480px) {
      header {
        padding: 12px 5% !important;
        position: sticky;
        top: 0;
        background-color: rgba(0, 0, 0, 0.9);
        z-index: 1000;
      }
      .logo img {
        height: 30px !important;
      }
      .hero {
        padding-top: 80px !important;
      }
      .hero h1 {
        font-size: 2rem !important;
        line-height: 1.2;
      }
      .hero p {
        font-size: 1rem !important;
      }
      .cta-button {
        padding: 12px 30px !important;
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <div class="logo">
      <a href="/" class="logo-combo">
        <img src="assets/logo.svg" alt="DonateNex" class="logo-icon">
        <span class="brand-name">DonateNex</span>
      </a>
    </div>
    <nav>
      <div class="language-selector">
        <button id="lang-btn">
          <span class="flag">🇺🇿</span>
          <span class="lang-code">UZ</span>
        </button>
        <ul class="lang-dropdown">
          <li data-lang="uz"><span class="flag">🇺🇿</span> O'zbekcha</li>
          <li data-lang="ru"><span class="flag">🇷🇺</span> Русский</li>
          <li data-lang="kz"><span class="flag">🇰🇿</span> Қазақша</li>
          <li data-lang="kg"><span class="flag">🇰🇬</span> Кыргызча</li>
          <li data-lang="tj"><span class="flag">🇹🇯</span> Тоҷикӣ</li>
        </ul>
      </div>
      <button class="login-btn" data-translate="login">Profil</button>
    </nav>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content" data-translate="hero">
      <h1 data-key="title">Barcha sng davlatlardan donat qabul qil.</h1>
      <p data-key="subtitle">Rossiya, Qozog'iston, Qirg'iziston, O'zbekiston va Tojikistondan xayriyalarni bir joyda boshqar: oson, tez va xavfsiz.</p>
      <button class="cta-button" data-key="cta">Boshlash</button>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p data-translate="footer">© 2023 DonateNex. Barcha huquqlar himoyalangan.</p>
  </footer>

  <!-- Scripts -->
  <script src="js/lang.js"></script>
  <script src="script.js"></script>
</body>
</html>
