<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F5FF" />
      <stop offset="100%" stop-color="#0066FF" />
    </linearGradient>
    <clipPath id="cutout">
      <rect x="0" y="0" width="200" height="200" rx="10" />
    </clipPath>
  </defs>
  
  <!-- Premium DN Monogram -->
  <g clip-path="url(#cutout)">
    <!-- D (Geometric) -->
    <path fill="none" stroke="url(#gradient)" stroke-width="12" stroke-linecap="round"
          d="M50,50 C80,30 120,30 150,50 L150,150 C120,170 80,170 50,150 Z" />
    
    <!-- N (Negative Space) -->
    <path fill="none" stroke="url(#gradient)" stroke-width="12" stroke-linejoin="bevel"
          d="M150,50 L110,150 M110,50 L150,150" />
    
    <!-- Premium Badge (Optional) -->
    <circle cx="180" cy="180" r="15" fill="#FFD700" stroke="#0066FF" stroke-width="2">
      <animate attributeName="r" values="15;17;15" dur="2s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
