<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F5FF" />
      <stop offset="100%" stop-color="#0066FF" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Abstract Nexus Symbol -->
  <g filter="url(#glow)">
    <!-- Core Shape (Donation + Connection) -->
    <path fill="url(#gradient)" 
          d="M100,40 L140,60 L160,100 L140,140 L100,160 L60,140 L40,100 L60,60 Z"
          stroke="#FFF" stroke-width="2" opacity="0.95" />
    
    <!-- Negative Space Lightning -->
    <path fill="none" stroke="#FFF" stroke-width="3" stroke-linecap="round"
          d="M100,70 L120,90 M100,110 L80,130 M100,130 L120,150" />
  </g>
</svg>
